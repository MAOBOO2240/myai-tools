<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍁 楓之谷送禮營利計算機</title>
    <style>
        :root {
            /* 淺色模式變數 (純白底、黑字) */
            --bg-color: #ffffff;
            --panel-bg: #ffffff;
            --panel-border: #e0e0e0;
            --text-main: #000000;
            --text-muted: #666666;
            --input-bg: #f9f9f9;
            --btn-primary: #000000;
            --btn-primary-text: #ffffff;
            --btn-primary-hover: #333333;
            --btn-secondary: #f0f0f0;
            --btn-secondary-hover: #e0e0e0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --profit-color: #00875A;
            --loss-color: #DE350B;
            --highlight-bg: #f5f5f5;
            --highlight-cost-bg: #fff0f0;
        }

        [data-theme="dark"] {
            /* 深色模式變數 (深灰底、灰框、漸層白光) */
            --bg-color: #151515; /* 較黑的灰底 */
            --panel-bg: #282828; /* 框體以灰色為主 */
            --panel-border: rgba(255, 255, 255, 0.08); /* 極淡的實體邊框輔助 */
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --input-bg: #1c1c1c;
            --btn-primary: #ffffff;
            --btn-primary-text: #000000;
            --btn-primary-hover: #cccccc;
            --btn-secondary: #383838;
            --btn-secondary-hover: #4a4a4a;
            
            /* 【核心重點】利用雙層 box-shadow 創造框邊緣的漸層白光效果 */
            /* 外層光暈 18px 擴散 + 內層邊緣 1px 白色微光 */
            --shadow: 0 0 18px rgba(255, 255, 255, 0.12), inset 0 0 1px rgba(255, 255, 255, 0.25);
            
            --profit-color: #4CAF50;
            --loss-color: #FF5252;
            --highlight-bg: #333333;
            --highlight-cost-bg: #3a1c1c;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 文字大小變數控制 */
        body.text-sm { font-size: 14px; }
        body.text-md { font-size: 16px; }
        body.text-lg { font-size: 18px; }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        /* 極簡面板 */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            height: fit-content;
        }

        h1, h2, h3 {
            margin-top: 0;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-controls {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        /* 帶文字的按鈕 */
        .btn-text-icon {
            background: var(--btn-secondary);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 1em;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-text-icon:hover { 
            background: var(--btn-secondary-hover); 
            /* 滑鼠移上去時，按鈕也會微微發出白光 */
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        .btn-icon-only {
            background: var(--btn-secondary);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2em;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-icon-only:hover { 
            background: var(--btn-secondary-hover);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hint {
            font-size: 0.85em;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
            font-family: inherit;
            font-size: inherit;
        }
        input[type="number"]:focus, select:focus {
            border-color: var(--text-main);
            /* 深色模式下，輸入框點擊時也會有白色發光效果 */
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }
        [data-theme="light"] input[type="number"]:focus, [data-theme="light"] select:focus {
            box-shadow: none; /* 淺色模式保持俐落不發光 */
        }

        button.primary {
            background: var(--btn-primary);
            color: var(--btn-primary-text);
            border: 1px solid var(--panel-border);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-size: 1.1em;
            transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
            margin-top: 10px;
        }
        button.primary:hover { 
            background: var(--btn-primary-hover); 
        }
        [data-theme="dark"] button.primary:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .result-box {
            background: var(--input-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--panel-border);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--panel-border);
            transition: border-color 0.4s ease;
        }
        .result-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .highlight-row {
            background: var(--highlight-bg);
            padding: 8px;
            border-radius: 6px;
            border-bottom: none;
            margin-top: 5px;
            margin-bottom: 5px;
            transition: background-color 0.4s ease;
        }
        .highlight-cost-row {
            background: var(--highlight-cost-bg);
            padding: 8px;
            border-radius: 6px;
            border-bottom: none;
            margin-top: 5px;
            margin-bottom: 5px;
            transition: background-color 0.4s ease;
        }

        .final-profit {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }
        .profit { color: var(--profit-color); transition: color 0.4s ease; }
        .loss { color: var(--loss-color); transition: color 0.4s ease; }

        /* 設定彈窗 */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #settings-modal.active { display: flex; opacity: 1; }

        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
    </style>
</head>
<body class="text-md" data-theme="light">

    <div class="container">
        <div class="header-controls">
            <h1 style="margin:0;">🍁 楓之谷即時營利計算機</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn-text-icon" id="theme-toggle" title="切換深淺色">🌙 深色模式</button>
                <button class="btn-icon-only" id="settings-btn" title="設定">⚙️</button>
            </div>
        </div>

        <div class="glass-panel">
            <h2>📝 參數設定</h2>
            
            <div class="form-group">
                <label id="label-amount">🎁 道具原價 (送禮金額)</label>
                <input type="number" id="input-gift-amount" min="0" step="100">
                <div class="hint">📌 對方玩家想購買的道具原本價格</div>
            </div>

            <div class="form-group">
                <label>🤝 送禮折數</label>
                <input type="number" id="input-discount" step="1" min="1" max="100">
                <div class="hint">📌 8折輸入 8，84折輸入 84，82折輸入 82</div>
            </div>

            <div class="form-group">
                <label>📈 楓點換楓幣比率</label>
                <input type="number" id="input-mp-rate" step="1" min="1">
                <div class="hint">📌 多少楓點可換 1E (一億) 楓幣</div>
            </div>

            <div class="form-group">
                <label>💵 遊戲幣值比率</label>
                <input type="number" id="input-meso-rate" step="10" min="0">
                <div class="hint">📌 每多少「萬」楓幣 = 1 台幣</div>
            </div>
        </div>

        <div class="glass-panel">
            <h2>📊 即時計算結果</h2>
            <div class="result-box">
                <div class="result-row highlight-cost-row">
                    <span style="font-weight: bold;">💸 實際儲值成本</span>
                    <span id="res-recharge-cost" style="font-weight: bold;">0 TWD</span>
                </div>
                <div class="hint" style="text-align: right; margin-top: -5px; margin-bottom: 10px;">(道具原價 ÷ 1.05 的官方回饋)</div>

                <div class="result-row highlight-row">
                    <span style="font-weight: bold;">🤝 對方需繳金額 (實收)</span>
                    <span id="res-buyer-pay" style="font-weight: bold;">0 TWD</span>
                </div>
                
                <div class="result-row">
                    <span>💎 獲得 VIP 點數</span>
                    <span id="res-vip">0 點</span>
                </div>
                <div class="result-row">
                    <span>🍁 VIP 兌換楓點 (300:1)</span>
                    <span id="res-mp">0 點</span>
                </div>
                <div class="result-row">
                    <span>🪙 楓點換成楓幣</span>
                    <span id="res-mesos">0 億</span>
                </div>
                <div class="result-row">
                    <span>💵 楓幣換算額外台幣</span>
                    <span id="res-meso-revenue">0 TWD</span>
                </div>
            </div>
            
            <div class="final-profit" id="res-final">
                等待計算...
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="glass-panel" style="width: 320px;">
            <h2>⚙️ 設定</h2>
            
            <div class="form-group">
                <label>👑 VIP 等級 (影響獲得點數)</label>
                <select id="vip-tier-select" onchange="calculate()">
                    <option value="16">非VIP (1 TWD = 16點)</option>
                    <option value="16">銀牌 (1 TWD = 16點)</option>
                    <option value="24">金牌 (1 TWD = 24點)</option>
                    <option value="32">鑽石 (1 TWD = 32點)</option>
                    <option value="40" selected>皇家 (1 TWD = 40點)</option>
                </select>
            </div>

            <div class="form-group">
                <label>🔠 文字大小</label>
                <select id="font-size-select" onchange="changeFontSize()">
                    <option value="text-sm">小 (Small)</option>
                    <option value="text-md" selected>中 (Medium)</option>
                    <option value="text-lg">大 (Large)</option>
                </select>
            </div>

            <button class="primary" onclick="closeSettings()" style="margin-top: 20px;">完成</button>
        </div>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // --- 1. 初始化與儲存設定 ---
        function init() {
            const savedTheme = localStorage.getItem('ms_theme') || 'light';
            setTheme(savedTheme);

            const savedFontSize = localStorage.getItem('ms_fontsize') || 'text-md';
            document.getElementById('font-size-select').value = savedFontSize;
            changeFontSize();

            const savedVipRate = localStorage.getItem('ms_val_vip') || '40';
            document.getElementById('vip-tier-select').value = savedVipRate;

            document.getElementById('input-gift-amount').value = localStorage.getItem('ms_val_amount') || 1500;
            document.getElementById('input-discount').value = localStorage.getItem('ms_val_discount') || 84;
            document.getElementById('input-mp-rate').value = localStorage.getItem('ms_val_mpRate') || 8;
            document.getElementById('input-meso-rate').value = localStorage.getItem('ms_val_mesoRate') || 2000;

            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', calculate);
            });

            calculate();
        }

        // --- 主題切換 ---
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        });

        function setTheme(theme) {
            body.setAttribute('data-theme', theme);
            if (theme === 'light') {
                themeToggleBtn.innerText = '🌙 深色模式';
            } else {
                themeToggleBtn.innerText = '☀️ 淺色模式';
            }
            localStorage.setItem('ms_theme', theme);
        }

        // --- 文字大小 ---
        function changeFontSize() {
            const size = document.getElementById('font-size-select').value;
            body.classList.remove('text-sm', 'text-md', 'text-lg');
            body.classList.add(size);
            localStorage.setItem('ms_fontsize', size);
        }

        // --- 設定彈窗控制 ---
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.add('active');
        });
        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('active');
            calculate();
        }

        // --- 2. 核心即時計算邏輯 ---
        function calculate() {
            const giftAmount = parseFloat(document.getElementById('input-gift-amount').value) || 0;
            const discountRaw = parseFloat(document.getElementById('input-discount').value) || 0;
            const mpRate = parseFloat(document.getElementById('input-mp-rate').value) || 1; 
            const mesoRate = parseFloat(document.getElementById('input-meso-rate').value) || 1; 
            const vipMultiplier = parseInt(document.getElementById('vip-tier-select').value) || 40;

            localStorage.setItem('ms_val_amount', giftAmount);
            localStorage.setItem('ms_val_discount', discountRaw);
            localStorage.setItem('ms_val_mpRate', mpRate);
            localStorage.setItem('ms_val_mesoRate', mesoRate);
            localStorage.setItem('ms_val_vip', vipMultiplier);

            let actualDiscount = 0; 
            if (discountRaw > 0) {
                actualDiscount = discountRaw < 10 ? discountRaw / 10 : discountRaw / 100;
            }

            const rechargeCost = Math.ceil(giftAmount / 1.05);
            const buyerPays = giftAmount * actualDiscount;
            const vipPoints = giftAmount * vipMultiplier;
            const maplePoints = vipPoints / 300;
            const mesosInE = maplePoints / mpRate;
            const totalMesosInW = mesosInE * 10000;
            const mesoRevenue = totalMesosInW / mesoRate;

            const totalRevenue = buyerPays + mesoRevenue;
            const profitOrLoss = totalRevenue - rechargeCost;

            document.getElementById('res-recharge-cost').innerText = rechargeCost.toLocaleString() + ' TWD';
            document.getElementById('res-buyer-pay').innerText = buyerPays.toFixed(0) + ' TWD';
            
            document.getElementById('res-vip').innerHTML = `${Math.floor(vipPoints).toLocaleString()} 點 <span style="font-size:0.8em; color:var(--text-muted);">(x${vipMultiplier})</span>`;
            document.getElementById('res-mp').innerText = Math.floor(maplePoints).toLocaleString() + ' 點';
            document.getElementById('res-mesos').innerText = mesosInE.toFixed(2) + ' 億';
            document.getElementById('res-meso-revenue').innerText = mesoRevenue.toFixed(0) + ' TWD';

            const finalEl = document.getElementById('res-final');
            if (giftAmount === 0) {
                finalEl.innerHTML = `等待輸入數值...`;
            } else if (profitOrLoss >= 0) {
                finalEl.innerHTML = `✨ 本次總營利: <span class="profit">+${profitOrLoss.toFixed(0)} TWD</span>`;
            } else {
                finalEl.innerHTML = `📉 本次總虧損: <span class="loss">${profitOrLoss.toFixed(0)} TWD</span>`;
            }
        }

        // 啟動初始化
        init();

    </script>
</body>
</html>
