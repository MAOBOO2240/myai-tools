<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬工具箱</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        /* 預設淺色模式變數 */
        :root {
            --bg-color: #f4f7f6;
            --sidebar-bg: #2c3e50;
            --sidebar-text: #ffffff;
            --text-color: #333333;
            --card-bg: #ffffff;
            --accent-color: #3498db;
            --border-color: #e0e0e0;
        }

        /* 深色模式變數 */
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --sidebar-bg: #111111;
            --sidebar-text: #e0e0e0;
            --text-color: #e0e0e0;
            --card-bg: #2d2d2d;
            --accent-color: #2980b9;
            --border-color: #444444;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        
        /* 側邊導覽列 */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        
        .sidebar-header {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }

        .nav-menu {
            flex-grow: 1;
            padding: 0 15px;
            overflow-y: auto;
        }

        .nav-btn {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--sidebar-text);
            padding: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            text-align: left;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--accent-color); font-weight: bold; }

        /* 側邊欄底部控制區 */
        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--sidebar-text);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }

        /* 主內容區 */
        .main-content {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .tool-section { 
            display: none; 
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            width: 100%;
            height: 95%; /* 讓 iframe 填滿畫面 */
        }
        .tool-section.active { display: block; }
        
        /* iframe 設定 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">🛠️ 工具箱</div>
        
        <div class="nav-menu" id="nav-menu">
            
            <button class="nav-btn active" onclick="showTool('timer', this)">⏳ 倒數計時器</button>
            <button class="nav-btn" onclick="showTool('gift', this)">🎁 送禮計算機</button>
            <button class="nav-btn" onclick="showTool('mapleEXP', this)">🌟 楓之谷經驗值計算</button>
            <button class="nav-btn" onclick="showTool('renamer', this)">📂 批量名稱更改器</button>
            
        </div>

        <div class="sidebar-footer">
            <button class="icon-btn" onclick="toggleTheme()" title="切換深淺色">🌓</button>
        </div>
    </div>

    <div class="main-content" id="main-content">

        <div id="timer" class="tool-section active">
            <iframe src="timer.html"></iframe>
        </div>

        <div id="renamer" class="tool-section">
            <iframe src="rename.html"></iframe>
        </div>

        <div id="mapleEXP" class="tool-section">
            <iframe src="mapleEXP.html"></iframe>
        </div>

        <div id="gift" class="tool-section">
            <iframe src="gift.html"></iframe>
        </div>

    </div>

    <script>
        // 切換工具功能
        function showTool(toolId, btnElement) {
            document.querySelectorAll('.tool-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(toolId).classList.add('active');
            if(btnElement) btnElement.classList.add('active');
        }

        // 深淺色模式切換與「獨立」記憶
        function toggleTheme() {
            const body = document.documentElement;
            const currentTheme = body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                body.removeAttribute('data-theme');
                // 使用專屬名稱 'toolbox_theme' 儲存主介面設定
                localStorage.setItem('toolbox_theme', 'light'); 
            } else {
                body.setAttribute('data-theme', 'dark');
                // 使用專屬名稱 'toolbox_theme' 儲存主介面設定
                localStorage.setItem('toolbox_theme', 'dark'); 
            }
        }

        // 網頁載入時，只讀取主介面的專屬設定
        window.onload = () => {
            if (localStorage.getItem('toolbox_theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        };
    </script>
</body>

</html>
