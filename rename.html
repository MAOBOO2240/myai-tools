<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win11 風格 - 批量檔案管理工具</title>
    <script src="https://cdn.jsdelivr.net/npm/gif.js/dist/gif.js"></script>
    
    <style>
        /* CSS 變數：用於控制黑白模式及全域字體大小 */
        :root {
            --bg-color: #f3f3f3;
            --text-color: #202020;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --btn-bg: rgba(255, 255, 255, 0.8);
            --btn-hover: rgba(255, 255, 255, 1);
            --input-bg: rgba(255, 255, 255, 0.5);
            --hover-border: #000000; 
            --input-btn-border: #000000; 
            --ui-font-size: 14px;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --glass-bg: rgba(30, 30, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --btn-bg: rgba(50, 50, 50, 0.8);
            --btn-hover: rgba(70, 70, 70, 1);
            --input-bg: rgba(0, 0, 0, 0.5);
            --hover-border: #ffffff; 
            --input-btn-border: rgba(255, 255, 255, 0.4); 
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: var(--ui-font-size);
            user-select: none; 
        }

        body.theme-transition { transition: background 0.3s, color 0.3s; }

        .top-bar {
            padding: 15px 25px; display: flex; justify-content: center;
            align-items: center; background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border); z-index: 10; gap: 15px;
        }

        .main-container { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }

        .win11-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex; flex-direction: column; overflow-y: auto;
        }

        .left-panel { width: 300px; flex-shrink: 0; gap: 12px; }
        .right-panel { flex: 1; display: flex; flex-direction: column; position: relative; }

        h3 { margin-top: 5px; margin-bottom: 10px; font-size: 1.15em; border-bottom: 1px solid var(--glass-border); padding-bottom: 5px; }
        h4 { margin: 10px 0 5px 0; font-size: 1.05em; }
        
        button, select, input {
            font-family: inherit; color: var(--text-color); border: 1px solid var(--input-btn-border);
            border-radius: 6px; padding: 8px 12px; outline: none; transition: all 0.2s; font-size: inherit; 
        }

        button { background: var(--btn-bg); cursor: pointer; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px; }
        button:hover { background: var(--btn-hover); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        input[type="text"], input[type="number"], select { background: var(--input-bg); width: 100%; box-sizing: border-box; margin-bottom: 8px; user-select: text; }

        .btn-primary { background: #0078d4; color: white; border: none; }
        .btn-primary:hover { background: #005a9e; }
        .btn-active { background: #0078d4; color: white; border: 1px solid #005a9e; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }

        .view-controls { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }

        .file-grid {
            display: flex; flex-wrap: wrap; gap: 15px; overflow-y: auto;
            align-content: flex-start; flex: 1; padding-right: 5px; padding-top: 10px; position: relative;
        }

        .file-card {
            position: relative; display: flex; flex-direction: column; align-items: center;
            padding: 10px; background: var(--glass-bg); border: 2px solid transparent;
            border-radius: 8px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); box-sizing: border-box; cursor: pointer;
        }

        .file-card:hover { border-color: var(--hover-border); transform: translateY(-2px); }

        .file-card.selected {
            border-color: #0078d4;
            background-color: rgba(0, 120, 212, 0.1);
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.2);
        }

        .delete-x {
            position: absolute; top: -8px; right: -8px; background: #ff4c4c; color: white;
            border-radius: 50%; width: 24px; height: 24px; text-align: center; line-height: 22px;
            cursor: pointer; font-size: 0.8em; display: none; z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); border: 1px solid white;
        }
        
        .undo-x { background: #0078d4; font-size: 1.1em; line-height: 20px;}
        .file-card:hover .delete-x { display: block; }

        .preview-img-container {
            display: flex; align-items: center; justify-content: center; background: var(--input-bg);
            border-radius: 8px; margin-bottom: 8px; overflow: hidden;
            background-image: linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05)), 
                              linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05));
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px; pointer-events: none;
        }
        
        .preview-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .file-old-name { 
            font-size: 0.9em; margin-bottom: 5px; opacity: 0.8; word-break: break-all; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
            overflow: hidden; min-height: 2.5em; pointer-events: none;
        }
        .file-name-input { 
            font-size: 0.9em; text-align: center; padding: 4px; margin-bottom: 5px; 
            border: 1px solid transparent; background: transparent; 
        }
        .file-name-input:focus { border: 1px solid var(--input-btn-border); background: var(--input-bg); }
        .file-status { font-size: 0.8em; font-weight: bold; pointer-events: none; }

        .size-small .file-card { width: 110px; }
        .size-small .preview-img-container { width: 64px; height: 64px; font-size: 24px; }
        .size-medium .file-card { width: 150px; }
        .size-medium .preview-img-container { width: 100px; height: 100px; font-size: 40px; }
        .size-large .file-card { width: 200px; }
        .size-large .preview-img-container { width: 150px; height: 150px; font-size: 60px; }

        .status-none { color: gray; font-weight: normal; }
        .status-rename { color: #2eb82e; }
        .status-delete { color: #ff4c4c; }
        .deleted-text { text-decoration: line-through; color: #ff4c4c; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px); z-index: 99999; display: none;
            justify-content: center; align-items: center; pointer-events: auto;
        }

        .dialog-box { width: 350px; text-align: center; }
        .settings-box { width: 400px; text-align: left; }

        .ext-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            background: var(--input-bg); padding: 10px; border-radius: 8px;
            border: 1px solid var(--glass-border); max-height: 150px; overflow-y: auto;
        }

        .ext-item { display: flex; align-items: center; gap: 5px; font-size: 0.9em; cursor: pointer; }

        .progress-track {
            width: 100%; height: 12px; background: var(--input-bg); border-radius: 6px; 
            overflow: hidden; border: 1px solid var(--glass-border); margin-top: 15px;
        }
        .progress-fill { width: 100%; height: 100%; background: #0078d4; transition: width 0.3s ease-out; }

        .icon-btn-circle {
            padding: 8px; border-radius: 50%; width: 42px; height: 42px; 
            font-size: 1.2em; display: flex; justify-content: center; align-items: center;
        }

        #selection-box {
            position: fixed; background: rgba(0, 120, 212, 0.3);
            border: 1px solid rgba(0, 120, 212, 0.8); pointer-events: none;
            z-index: 9999; display: none;
        }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem('app_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
        
        // 全域攔截器開關
        let isProcessing = false;

        // 強制攔截所有鍵盤與滑鼠事件 (防 Enter / 防連點 Bug)
        const blockEvent = (e) => {
            if (isProcessing) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        };
        document.addEventListener('keydown', blockEvent, { capture: true });
        document.addEventListener('mousedown', blockEvent, { capture: true });
    </script>

    <div id="selection-box"></div>

    <div id="progress-overlay" class="overlay">
        <div class="dialog-box win11-panel">
            <h3 style="margin: 0; border: none;" id="progress-main-title">⏳ 正在處理中，請稍候...</h3>
            <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
            <div id="progress-text" style="font-size: 0.9em; margin-top: 10px; opacity: 0.8;">進度計算中...</div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay">
        <div class="settings-box win11-panel">
            <h3 style="margin-top: 0;">⚙️ 偏好設定</h3>
            <h4>外觀與顯示</h4>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="font-size: 1em; line-height: 34px;">預設圖示預覽大小：</span>
                <select id="set-icon-size" style="width: 150px; margin: 0;">
                    <option value="small">小圖示</option>
                    <option value="medium">中圖示</option>
                    <option value="large">大圖示</option>
                </select>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <span style="font-size: 1em; line-height: 34px;">介面字體大小：</span>
                <select id="set-font-size" style="width: 150px; margin: 0;">
                    <option value="12px">偏小 (12px)</option>
                    <option value="14px">適中 (14px)</option>
                    <option value="16px">偏大 (16px)</option>
                    <option value="18px">特大 (18px)</option>
                </select>
            </div>
            <h4>副檔名快捷選單管理</h4>
            <div class="ext-grid" id="ext-checkbox-container"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="saveSettings()" class="btn-primary" style="flex: 1;">💾 儲存並關閉</button>
                <button onclick="closeSettings()" style="flex: 1;">❌ 取消</button>
            </div>
        </div>
    </div>

    <div class="top-bar">
        <button id="theme-btn" class="icon-btn-circle" onclick="toggleTheme()" title="切換深淺模式">🌙</button>
        <button onclick="openSettings()" style="padding: 10px 20px;">⚙️ 設定</button>
    </div>

    <div class="main-container">
        
        <div class="left-panel win11-panel">
            
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <button onclick="selectFolder()" class="btn-primary" style="flex: 1; padding: 12px 5px; font-size: 1em;" title="支援完整批量改名與刪除">📁 選擇資料夾</button>
                <button onclick="selectFiles()" class="btn-primary" style="flex: 1; padding: 12px 5px; font-size: 1em;" title="支援圖片處理與改名">📄 選擇檔案</button>
            </div>
            
            <button onclick="refreshFolder()" style="padding: 8px; margin-bottom: 10px;">🔄 刷新檔案列表</button>

            <h3>🗑️ 批量刪除</h3>
            <input type="text" id="keyword-del" placeholder="輸入包含的檔名關鍵字..." oninput="applyRules()">

            <h3>📝 批量改名 (序列)</h3>
            <input type="text" id="rename-prefix" placeholder="前綴名稱 (選填)" oninput="applyRules()">
            <input type="text" id="rename-start" placeholder="起始數字 (例如:001)" oninput="applyRules()">

            <h3>🔤 文字替換</h3>
            <input type="text" id="replace-target" placeholder="輸入想替換的內容..." oninput="applyRules()">
            <input type="text" id="replace-with" placeholder="替換成...? (留空為刪除)" oninput="applyRules()">

            <h3>🔄 批量改副檔名</h3>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <select id="ext-select" style="flex: 1;" onchange="toggleGifSettings(); applyRules();"></select>
            </div>

            <div id="gif-settings-panel" style="display: none; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px dashed var(--glass-border);">
                <div style="display: flex; gap: 8px;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.8em; font-weight: bold; margin-bottom: 4px; display: block;">⏳ 延遲 (毫秒)</label>
                        <input type="number" id="gif-delay" placeholder="預設: 原檔速度" min="1" style="margin: 0;" oninput="applyRules()">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.8em; font-weight: bold; margin-bottom: 4px; display: block;">🔁 重複 (0=無限)</label>
                        <input type="number" id="gif-loop" placeholder="0=無限" min="0" value="0" style="margin: 0;" oninput="applyRules()">
                    </div>
                </div>
            </div>

            <h3>🎞️ 靜態圖片處理</h3>
            <button id="toggle-anim-btn" onclick="toggleRemoveAnimation()" title="將動態圖(如 WebP, APNG)擷取第一幀轉為靜態" style="width: 100%;">🛑 移除圖片動畫 (關閉)</button>

            <div style="margin-top: auto; margin-bottom: 20px;"></div>
            
            <div style="margin-top: auto;">
                <button onclick="applyChanges()" class="btn-primary" style="width: 100%; padding: 12px; font-size: 1.1em;">✅ 執行所有修改</button>
                <p style="font-size: 0.8em; opacity: 0.8; margin-top: 5px; text-align: center;">⚠️ 點擊執行將直接修改/覆蓋您的原檔案</p>
            </div>
        </div>

        <div class="right-panel win11-panel" id="right-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h3 id="preview-header" style="margin: 0; border: none; padding: 0;">📂 檔案預覽區域</h3>
                    <button id="reset-btn" onclick="resetWorkspace()" style="padding: 5px 10px; font-size: 0.85em; display: none; background: #ff4c4c; color: white; border: none;" title="清空畫面，不影響實體檔案">🧹 重設</button>
                    <button id="undo-btn" onclick="undoChanges()" style="padding: 5px 10px; font-size: 0.85em; display: none; background: #2eb82e; color: white; border: none;" title="復原剛剛執行的所有操作">↩️ 返回</button>
                    <button id="delete-selected-btn" onclick="deleteSelected()" style="padding: 5px 10px; font-size: 0.85em; display: none; background: #ff4c4c; color: white; border: none;" title="將選取的檔案標記為刪除">🗑️ 刪除選取</button>
                    <span id="selection-status" style="font-size: 0.85em; color: #0078d4; font-weight: bold; display: none; margin-left: 5px;">✅ 局部選取</span>
                </div>
                <div class="view-controls" style="margin: 0;">
                    <span style="font-size: 0.9em;">🖼️ 顯示大小：</span>
                    <button onclick="changeViewSize('small')">小</button>
                    <button onclick="changeViewSize('medium')">中</button>
                    <button onclick="changeViewSize('large')">大</button>
                </div>
            </div>
            <div id="file-grid" class="file-grid size-medium">
                <div style="width: 100%; text-align: center; opacity: 0.6; margin-top: 20px;">請先從左側選擇資料夾或檔案</div>
            </div>
        </div>

    </div>

    <script>
        let directoryHandle = null;
        let filesData = [];
        let undoStack = []; 
        let isRemoveAnimActive = false; 
        
        let gifWorkerUrl = null;
        let parseAPNG = null;
        let parseGIF = null;
        let decompressFrames = null;

        async function initWorkersAndModules() {
            try {
                const res = await fetch('https://cdn.jsdelivr.net/npm/gif.js/dist/gif.worker.js');
                const blob = await res.blob();
                gifWorkerUrl = URL.createObjectURL(blob);
            } catch(e) { gifWorkerUrl = 'https://cdn.jsdelivr.net/npm/gif.js/dist/gif.worker.js'; }

            try {
                const moduleApng = await import('https://cdn.skypack.dev/apng-js');
                parseAPNG = moduleApng.default;
            } catch(e) { console.error("APNG parser 載入失敗", e); }
            
            try {
                const moduleGif = await import('https://cdn.jsdelivr.net/npm/gifuct-js@2.1.2/+esm');
                parseGIF = moduleGif.parseGIF || (moduleGif.default && moduleGif.default.parseGIF);
                decompressFrames = moduleGif.decompressFrames || (moduleGif.default && moduleGif.default.decompressFrames);
            } catch(e) { console.error("GIF parser 載入失敗", e); }
        }

        const ALL_EXTENSIONS = [
            { ext: '.txt', desc: '純文字' }, { ext: '.jpg', desc: '圖片' },
            { ext: '.png', desc: '圖片' }, { ext: '.mp4', desc: '影片' },
            { ext: '.pdf', desc: '文件' }, { ext: '.docx', desc: 'Word' },
            { ext: '.xlsx', desc: 'Excel' }, { ext: '.zip', desc: '壓縮檔' },
            { ext: '.gif', desc: '動圖' }, { ext: '.webp', desc: '網頁圖片' },
            { ext: '.mp3', desc: '音樂' }, { ext: '.json', desc: '資料檔' }
        ];
        const DEFAULT_EXTENSIONS = ['.txt', '.jpg', '.png', '.mp4', '.pdf'];

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('app_theme');
            const btn = document.getElementById('theme-btn');
            if (savedTheme === 'dark') { btn.innerHTML = "☀️"; } else { btn.innerHTML = "🌙"; }
            setTimeout(() => { document.body.classList.add('theme-transition'); }, 100);

            applySavedSettings();
            renderMainExtSelect();
            initWorkersAndModules(); 
            initDragSelect(); 
        });

        function initDragSelect() {
            const selectionBox = document.getElementById('selection-box');
            let isDragging = false;
            let hasDragged = false;
            let startX = 0, startY = 0;
            let initialSelection = [];

            document.addEventListener('mousedown', (e) => {
                if (isProcessing) return; // 鎖定狀態不可選取
                if (!e.target.closest('#right-panel')) return;
                if (e.target.closest('button, input, select, .delete-x')) return;
                if (e.button !== 0) return; 

                isDragging = true;
                hasDragged = false;
                startX = e.clientX;
                startY = e.clientY;
                
                selectionBox.style.display = 'none';

                const keepPrevious = e.shiftKey || e.ctrlKey;
                initialSelection = filesData.map(f => keepPrevious ? f.selected : false);
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging || isProcessing) return;

                const dx = e.clientX - startX;
                const dy = e.clientY - startY;

                if (!hasDragged && Math.sqrt(dx*dx + dy*dy) > 3) {
                    hasDragged = true;
                    selectionBox.style.display = 'block';

                    const keepPrevious = e.shiftKey || e.ctrlKey;
                    if (!keepPrevious) {
                        filesData.forEach(f => f.selected = false);
                        document.querySelectorAll('.file-card').forEach(card => card.classList.remove('selected'));
                    }
                }

                if (hasDragged) {
                    const currentX = e.clientX;
                    const currentY = e.clientY;

                    const left = Math.min(startX, currentX);
                    const top = Math.min(startY, currentY);
                    const width = Math.abs(currentX - startX);
                    const height = Math.abs(currentY - startY);

                    selectionBox.style.left = left + 'px';
                    selectionBox.style.top = top + 'px';
                    selectionBox.style.width = width + 'px';
                    selectionBox.style.height = height + 'px';

                    const boxRect = selectionBox.getBoundingClientRect();
                    const cards = document.querySelectorAll('.file-card');

                    cards.forEach((card, index) => {
                        const cardRect = card.getBoundingClientRect();
                        const isIntersecting = !(
                            cardRect.right < boxRect.left || 
                            cardRect.left > boxRect.right || 
                            cardRect.bottom < boxRect.top || 
                            cardRect.top > boxRect.bottom
                        );

                        filesData[index].selected = initialSelection[index] || isIntersecting;
                        if (filesData[index].selected) {
                            card.classList.add('selected');
                        } else {
                            card.classList.remove('selected');
                        }
                    });

                    updateSelectionUI();
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                selectionBox.style.display = 'none';

                if (hasDragged) {
                    applyRules(); 
                } else {
                    const card = e.target.closest('.file-card');
                    if (card) {
                        const index = Array.from(document.querySelectorAll('.file-card')).indexOf(card);
                        if (index > -1) {
                            const keepPrevious = e.shiftKey || e.ctrlKey;
                            if (!keepPrevious) {
                                filesData.forEach((f, i) => f.selected = (i === index ? !f.selected : false));
                            } else {
                                filesData[index].selected = !filesData[index].selected;
                            }
                            updateSelectionUI();
                            renderGrid();
                            applyRules();
                        }
                    } else if (e.target.closest('#file-grid')) {
                        filesData.forEach(f => f.selected = false);
                        updateSelectionUI();
                        renderGrid();
                        applyRules();
                    }
                }
                hasDragged = false;
            });
        }

        function updateSelectionUI() {
            const selectedFiles = filesData.filter(f => f.selected);
            const hasSelection = selectedFiles.length > 0;
            document.getElementById('selection-status').style.display = hasSelection ? 'inline-block' : 'none';
            
            const delBtn = document.getElementById('delete-selected-btn');
            if (hasSelection) {
                delBtn.style.display = 'inline-block';
                const allDeleted = selectedFiles.every(f => f.isManuallyDeleted);
                if (allDeleted) {
                    delBtn.innerText = "↩️ 取消刪除選取";
                    delBtn.style.background = "#2eb82e";
                } else {

        async function loadFiles() {
            cleanupObjectUrls(); filesData = [];
            for await (const entry of directoryHandle.values()) {
                if (entry.kind === 'file') {
                    filesData.push({ 
                        handle: entry, oldName: entry.name, newName: entry.name, 
                        action: 'none', removeAnim: false, previewUrl: null, selected: false,
                        isManuallyDeleted: false 
                    });

        function deleteSelected() {
            if(!checkDirHandle()) return;
            const selectedFiles = filesData.filter(f => f.selected);
            if (selectedFiles.length === 0) return;
            
            const allDeleted = selectedFiles.every(f => f.isManuallyDeleted);
            
            filesData.forEach(f => {

        function toggleRemoveAnimation() {
            isRemoveAnimActive = !isRemoveAnimActive;
            const btn = document.getElementById('toggle-anim-btn');
            if (isRemoveAnimActive) {
                btn.classList.add('btn-active');
                btn.innerText = "🛑 移除圖片動畫 (已啟用)";
            } else {
                btn.classList.remove('btn-active');

        function applyRules() {
            if (filesData.length === 0) return;

            const delKeyword = document.getElementById('keyword-del').value;
            const renPrefix = document.getElementById('rename-prefix').value;
            const renStart = document.getElementById('rename-start').value;
            const repTarget = document.getElementById('replace-target').value;
            const repWith = document.getElementById('replace-with').value;
            const newExt = document.getElementById('ext-select').value;
            const delayValue = document.getElementById('gif-delay').value;
            const loopValue = document.getElementById('gif-loop').value;

            // 留空為 null
            const delay = delayValue === '' ? null : parseInt(delayValue);
            const loop = loopValue === '' ? 0 : parseInt(loopValue);

            const hasSelected = filesData.some(f => f.selected);

            let currentNum = renStart ? parseInt(renStart, 10) : NaN;
            const padLength = renStart ? renStart.length : 0;

            filesData.forEach(file => {
                file.newName = file.oldName;
                file.action = 'none';
                delete file.gifDelay;
                delete file.gifLoop;
                
                const shouldApply = !hasSelected || file.selected;
                file.removeAnim = isRemoveAnimActive && shouldApply && ['jpg','jpeg','png','gif','webp','bmp','apng'].includes(file.oldName.split('.').pop().toLowerCase());

                if (file.isManuallyDeleted) {
                    file.action = 'delete';
                    return; 
                }

                if (shouldApply && delKeyword && file.oldName.includes(delKeyword)) {
                    file.action = 'delete';
                    return;
                }

                if (hasSelected && !file.selected) return; 

                let tempName = file.newName;

                if (repTarget) {
                    const extIndex = tempName.lastIndexOf('.');
                    const baseName = extIndex > -1 ? tempName.substring(0, extIndex) : tempName;
                    const ext = extIndex > -1 ? tempName.substring(extIndex) : '';
                    if (baseName.includes(repTarget)) {
                        tempName = baseName.split(repTarget).join(repWith) + ext;
                    }
                }

                if (!isNaN(currentNum)) {
                    const extIndex = tempName.lastIndexOf('.');
                    const ext = extIndex > -1 ? tempName.substring(extIndex) : '';
                    tempName = `${renPrefix}${String(currentNum).padStart(padLength, '0')}${ext}`;
                    currentNum++;
                }

                if (newExt) {
                    const extIndex = tempName.lastIndexOf('.');
                    const baseName = extIndex > -1 ? tempName.substring(0, extIndex) : tempName;
                    const oldExt = extIndex > -1 ? tempName.substring(extIndex).toLowerCase() : '';
                    
                    if (newExt === '.gif' && ['.jpg', '.jpeg', '.png', '.webp', '.bmp', '.gif', '.apng'].includes(oldExt)) {
                        tempName = baseName + '.gif';
                        file.action = 'convert_gif';
                        file.gifDelay = delay; 
                        file.gifLoop = loop;
                    } else {
                        tempName = baseName + newExt;
                    }
                }

                if (file.action !== 'convert_gif' && file.action !== 'delete') {
                    if (tempName !== file.oldName) {
                        file.newName = tempName;
                        file.action = 'rename';
                    }
                } else if (file.action === 'convert_gif') {
                    file.newName = tempName;
                }
            });

            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '';
            
            if (filesData.length === 0) {
                grid.innerHTML = '<div style="width: 100%; text-align: center; opacity: 0.6; margin-top: 20px;">請先從左側選擇資料夾或檔案</div>';
                updateSelectionUI();
                return;
            }

            filesData.forEach((file, index) => {
                const card = document.createElement('div');
                card.className = file.selected ? 'file-card selected' : 'file-card';
                
                const ext = file.oldName.split('.').pop().toLowerCase();
                const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'apng'].includes(ext);
                
                const imgContainer = document.createElement('div');
                imgContainer.className = 'preview-img-container';
                
                if (isImage) {
                    if (file.previewUrl) {
                        imgContainer.innerHTML = `<img src="${file.previewUrl}" class="preview-img" draggable="false">`;
                    } else {
                        imgContainer.innerHTML = `⏳`;
                        file.handle.getFile().then(fileData => {
                            file.previewUrl = URL.createObjectURL(fileData);
                            imgContainer.innerHTML = `<img src="${file.previewUrl}" class="preview-img" draggable="false">`;
                        });
                    }
                } else {
                    imgContainer.innerHTML = `📄`;
                }

                let statusClass = 'status-none';
                let statusText = '無變更';
                let inputClass = 'file-name-input';

                if (file.action === 'delete') {
                    statusClass = 'status-delete'; statusText = '🗑️ 將被刪除'; inputClass += ' deleted-text';
                } else if (file.action === 'convert_gif') {
                    statusClass = 'status-rename';
                    const delayStr = file.gifDelay === null ? '自動極限速度' : `${file.gifDelay}ms`;
                    statusText = `🔄 轉 GIF (延遲:${delayStr}, 重複:${file.gifLoop === 0 ? '無限' : file.gifLoop})`;
                } else if (file.action === 'rename' || file.removeAnim) {
                    statusClass = 'status-rename';
                    statusText = file.action === 'rename' ? '📝 將被改名' : '';
                    if (file.removeAnim) statusText += (statusText ? ' + ' : '') + '🛑 轉為靜態';
                }

                const deleteBtnHtml = file.action === 'delete' || file.isManuallyDeleted
                    ? `<span class="delete-x undo-x" onclick="undoDelete(${index}, event)" title="取消刪除">↺</span>`
                    : `<span class="delete-x" onclick="markDelete(${index}, event)" title="刪除此檔案">✖</span>`;

                const disableInput = (file.action === 'delete') ? 'disabled' : '';

                card.innerHTML = `
                    ${deleteBtnHtml}
                    <div class="file-old-name" title="${file.oldName}">${file.oldName}</div>
                    <input type="text" class="${inputClass}" value="${file.newName}" 
                           onchange="manualEdit(${index}, this.value)" ${disableInput}>
                    <div class="file-status ${statusClass}">${statusText}</div>
                `;
                card.insertBefore(imgContainer, card.firstChild); grid.appendChild(card);
            });
            updateSelectionUI();
        }

        function markDelete(index, event) { 
            if(!checkDirHandle()) return; 
            filesData[index].isManuallyDeleted = true; 
            applyRules(); 
        }
        function undoDelete(index, event) { 
            filesData[index].isManuallyDeleted = false; 
            applyRules(); 
        }

        function manualEdit(index, value) {
            if (filesData[index].oldName !== value) { 
                filesData[index].newName = value; 
                filesData[index].action = 'rename'; 
            } 
        }

        const loadImgFromBlob = (blob) => {
            return new Promise((resolve, reject) => {
                const img = new Image(); const url = URL.createObjectURL(blob);
                img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
                img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Image load failed")); };
                img.src = url;
            });
        };

        const getStaticBlob = async (fileData) => {
            const img = await loadImgFromBlob(fileData);
            const canvas = document.createElement('canvas');
            canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d'); 
            ctx.drawImage(img, 0, 0); 
            return new Promise(resolve => canvas.toBlob(resolve, fileData.type || 'image/png'));
        };

        async function undoChanges() {
            if (undoStack.length === 0) return;
            isProcessing = true; // 啟動攔截
            const tx = undoStack.pop(); 
            
            const overlay = document.getElementById('progress-overlay');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            document.getElementById('progress-main-title').innerText = "⏪ 正在時光倒流，還原檔案中...";
            overlay.style.display = 'flex';
            
            let total = tx.length; let curr = 0;
            
            for (const record of tx) {
                curr++;
                progressText.innerText = `🔄 正在還原: ${record.originalName} ...`;
                progressFill.style.width = `${(curr / total) * 100}%`;
                
                if (directoryHandle) {
                    if (record.newName !== record.originalName && record.action !== 'delete') {
                        try { await directoryHandle.removeEntry(record.newName); } catch(e) {}
                    }
                    try {
                        const fileHandle = await directoryHandle.getFileHandle(record.originalName, { create: true });
                        const writable = await fileHandle.createWritable();
                        await writable.write(record.blob);
                        await writable.close();
                    } catch(e) { console.error("還原寫入失敗:", e); }
                } else {
                    if (record.newName !== record.originalName && record.action !== 'delete') {
                        if (typeof record.handle.move === 'function') {
                            try { await record.handle.move(record.originalName); } catch(e) {}
                        }
                    }
                    try {
                        const writable = await record.handle.createWritable();
                        await writable.write(record.blob);
                        await writable.close();
                    } catch(e) { console.error("還原寫入失敗:", e); }
                }
            }
            
            setTimeout(async () => {
                overlay.style.display = 'none';
                document.getElementById('progress-main-title').innerText = "⏳ 正在處理中，請稍候...";
                
                if (undoStack.length === 0) {
                    document.getElementById('undo-btn').style.display = 'none';
                }
                
                isProcessing = false; // 解除攔截
                alert("✅ 已成功復原剛剛的所有修改，檔案已回到最初的狀態！");
                
                if (directoryHandle) {
                    await loadFiles();
                } else {
                    filesData.forEach(f => {
                        const rec = tx.find(t => t.handle === f.handle);
                        if (rec) {
                            f.oldName = rec.originalName; f.newName = rec.originalName;
                            f.action = 'none'; f.removeAnim = false; f.selected = false; f.isManuallyDeleted = false;
                            if (f.previewUrl) { URL.revokeObjectURL(f.previewUrl); f.previewUrl = null; }
                        }
                    });
                    applyRules();
                }
            }, 300);
        }

        async function applyChanges() {
            const filesToProcess = filesData.filter(f => f.action !== 'none' || f.removeAnim);
            if (filesToProcess.length === 0) return alert("目前沒有需要被修改的檔案！");
            if (!confirm("確定要執行這些修改嗎？\n⚠️ 此操作將直接修改/覆蓋您的原本檔案，或生成新檔案！")) return;

            isProcessing = true; // 啟動攔截

            const overlay = document.getElementById('progress-overlay');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            overlay.style.display = 'flex';
            
            const transaction = [];
            for (const file of filesToProcess) {
                try {
                    const originalFileHandle = file.handle;
                    const liveFile = await originalFileHandle.getFile();
                    const buffer = await liveFile.arrayBuffer(); 
                    const safeCloneBlob = new Blob([buffer], { type: liveFile.type });
                    
                    transaction.push({
                        handle: originalFileHandle,
                        originalName: file.oldName,
                        newName: file.newName,
                        action: file.action,
                        blob: safeCloneBlob
                    });
                } catch(e) { console.warn("無法深層備份檔案", e); }
            }
            
            const totalTasks = filesToProcess.length; let remainingTasks = totalTasks;
            progressFill.style.width = '0%'; progressText.innerText = `處理中...`;

            // 去背演算法 (保留不變)
            const applyAlphaThreshold = (ctx, width, height) => {
                const imgData = ctx.getImageData(0, 0, width, height);
                const data = imgData.data;
                for (let j = 0; j < data.length; j += 4) {
                    if (data[j+3] < 128) {
                        data[j] = 255;   
                        data[j+1] = 0;   
                        data[j+2] = 255; 
                        data[j+3] = 255; 
                    } else {
                        data[j+3] = 255; 
                        if (data[j] === 255 && data[j+1] === 0 && data[j+2] === 255) {
                            data[j+1] = 1;
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            };

            for (const file of filesToProcess) {
                try {
                    const originalFileHandle = file.handle;

                    if (file.action === 'convert_gif') {
                        progressText.innerText = `正在分析 ${file.oldName} ...`;
                        const fData = await originalFileHandle.getFile();
                        
                        let apng = null; let isApng = false;
                        let parsedGifFrames = null; let gifLsd = null;
                        let isGif = file.oldName.toLowerCase().endsWith('.gif');
                        
                        if (parseAPNG && file.oldName.toLowerCase().endsWith('.png')) {
                            try {
                                const buffer = await fData.arrayBuffer();
                                apng = parseAPNG(buffer);
                                if (!(apng instanceof Error) && apng.frames && apng.frames.length > 1) {
                                    isApng = true;
                                }
                            } catch (e) { console.warn("APNG 解析失敗:", e); }
                        }

                        if (isGif && parseGIF && decompressFrames) {
                            try {
                                const buffer = await fData.arrayBuffer();
                                const parsed = parseGIF(buffer);
                                gifLsd = parsed.lsd;
                                parsedGifFrames = decompressFrames(parsed, true);
                            } catch (e) { console.warn("GIF 拆解失敗:", e); }
                        }

                        const gif = new GIF({
                            workers: 2, 
                            quality: 10, 
                            repeat: file.gifLoop, 
                            workerScript: gifWorkerUrl,
                            transparent: 0xFF00FF 
                        });

                        // ==== 核心修復：時間誤差補償變數 ====
                        let timeAccumulator = 0;

                        if (isApng) {
                            progressText.innerText = `重新壓製 APNG 動畫中 (${apng.frames.length} 幀)...`;
                            await apng.createImages();
                            
                            const w = apng.width; const h = apng.height;
                            gif.options.width = w; gif.options.height = h;

                            const compCanvas = document.createElement('canvas');
                            compCanvas.width = w; compCanvas.height = h;
                            const compCtx = compCanvas.getContext('2d');
                            
                            const gifCanvas = document.createElement('canvas');
                            gifCanvas.width = w; gifCanvas.height = h;
                            const gifCtx = gifCanvas.getContext('2d');

                            let prevImageData = null;

                            for (let i = 0; i < apng.frames.length; i++) {
                                const frame = apng.frames[i];
                                
                                if (i > 0) {
                                    const prevFrame = apng.frames[i - 1];
                                    if (prevFrame.disposeOp === 1) {
                                        compCtx.clearRect(prevFrame.left, prevFrame.top, prevFrame.width, prevFrame.height);
                                    } else if (prevFrame.disposeOp === 2 && prevImageData) {
                                        compCtx.putImageData(prevImageData, 0, 0);
                                    }
                                }
                                
                                if (frame.disposeOp === 2) prevImageData = compCtx.getImageData(0, 0, w, h);
                                if (frame.blendOp === 0) {
                                    compCtx.clearRect(frame.left, frame.top, frame.width, frame.height);
                                }
                                
                                if (frame.imageElement) compCtx.drawImage(frame.imageElement, frame.left, frame.top);
                                
                                gifCtx.clearRect(0, 0, w, h);
                                gifCtx.drawImage(compCanvas, 0, 0);
                                
                                applyAlphaThreshold(gifCtx, w, h);
                                
                                // 精準抓取原檔毫秒
                                let rawDelay = 100;
                                if (file.gifDelay !== null) {
                                    rawDelay = file.gifDelay;
                                } else {
                                    if (typeof frame.delay === 'number' && frame.delay > 0) {
                                        rawDelay = frame.delay;
                                    } else {
                                        rawDelay = 100; // 防呆預設
                                    }
                                }
                                
                                // 加上上一幀的誤差債務
                                let targetDelay = rawDelay + timeAccumulator;
                                
                                // 轉換為 GIF 的 10ms 單位
                                let finalDelay = Math.round(targetDelay / 10) * 10;
                                
                                // 瀏覽器死亡區間防護
                                if (finalDelay < 20) {
                                    finalDelay = 20;
                                }
                                
                                // 記錄這一幀的誤差，留給下一幀補償 (限制上下限避免暴走)
                                timeAccumulator = targetDelay - finalDelay;
                                if (timeAccumulator > 25) timeAccumulator = 25;
                                if (timeAccumulator < -25) timeAccumulator = -25;

                                gif.addFrame(gifCanvas, { delay: finalDelay, copy: true });
                            }
                        } else if (parsedGifFrames && parsedGifFrames.length > 0) {
                            progressText.innerText = `重新賦予 GIF 延遲中 (${parsedGifFrames.length} 幀)...`;
                            
                            const w = gifLsd ? gifLsd.width : parsedGifFrames[0].dims.width;
                            const h = gifLsd ? gifLsd.height : parsedGifFrames[0].dims.height;
                            gif.options.width = w; gif.options.height = h;

                            const compCanvas = document.createElement('canvas');
                            compCanvas.width = w; compCanvas.height = h;
                            const compCtx = compCanvas.getContext('2d');
                            
                            const gifCanvas = document.createElement('canvas');
                            gifCanvas.width = w; gifCanvas.height = h;
                            const gifCtx = gifCanvas.getContext('2d');

                            let prevImageData = null;

                            for (let i = 0; i < parsedGifFrames.length; i++) {
                                const frame = parsedGifFrames[i];
                                
                                if (i > 0) {
                                    const prevFrame = parsedGifFrames[i - 1];
                                    if (prevFrame.disposalType === 2) {
                                        compCtx.clearRect(prevFrame.dims.left, prevFrame.dims.top, prevFrame.dims.width, prevFrame.dims.height);
                                    } else if (prevFrame.disposalType === 3 && prevImageData) {
                                        compCtx.putImageData(prevImageData, 0, 0);
                                    }
                                }
                                
                                if (frame.disposalType === 3) {
                                    prevImageData = compCtx.getImageData(0, 0, w, h);
                                }
                                
                                if (frame.patch && frame.patch.length > 0) {
                                    const patchCanvas = document.createElement('canvas');
                                    patchCanvas.width = frame.dims.width; 
                                    patchCanvas.height = frame.dims.height;
                                    const patchCtx = patchCanvas.getContext('2d');
                                    const patchData = patchCtx.createImageData(frame.dims.width, frame.dims.height);
                                    
                                    const patchArray = new Uint8ClampedArray(frame.patch);
                                    const safeLen = Math.min(patchData.data.length, patchArray.length);
                                    
                                    for(let p=0; p < safeLen; p++) {
                                        patchData.data[p] = patchArray[p];
                                    }
                                    
                                    patchCtx.putImageData(patchData, 0, 0);
                                    compCtx.drawImage(patchCanvas, frame.dims.left, frame.dims.top);
                                }
                                
                                gifCtx.clearRect(0, 0, w, h);
                                gifCtx.drawImage(compCanvas, 0, 0);
                                
                                applyAlphaThreshold(gifCtx, w, h);
                                
                                let rawDelay = file.gifDelay !== null ? file.gifDelay : (frame.delay ? frame.delay * 10 : 100);
                                
                                let targetDelay = rawDelay + timeAccumulator;
                                let finalDelay = Math.round(targetDelay / 10) * 10;
                                if (finalDelay < 20) finalDelay = 20;
                                
                                timeAccumulator = targetDelay - finalDelay;
                                if (timeAccumulator > 25) timeAccumulator = 25;
                                if (timeAccumulator < -25) timeAccumulator = -25;
                                
                                gif.addFrame(gifCanvas, { delay: finalDelay, copy: true });
                            }
                        } else {
                            progressText.innerText = `轉換靜態圖片為 GIF...`;
                            const img = await loadImgFromBlob(fData);
                            const w = img.width; const h = img.height;
                            gif.options.width = w; gif.options.height = h;
                            
                            const canvas = document.createElement('canvas');
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            
                            ctx.clearRect(0, 0, w, h);
                            ctx.drawImage(img, 0, 0, w, h);
                            
                            applyAlphaThreshold(ctx, w, h);
                            
                            let rawDelay = file.gifDelay !== null ? file.gifDelay : 100;
                            let finalDelay = Math.round(rawDelay / 10) * 10;
                            if (finalDelay < 20) finalDelay = 20;

                            gif.addFrame(canvas, { delay: finalDelay, copy: true });
                        }

                        progressText.innerText = `正在輸出新的 GIF 檔案: ${file.newName}`;
                        const gifBlob = await new Promise(resolve => {
                            gif.on('finished', blob => resolve(blob));
                            gif.render();
                        });

                        if (directoryHandle) {
                            const newFileHandle = await directoryHandle.getFileHandle(file.newName, { create: true });
                            const writable = await newFileHandle.createWritable();
                            await writable.write(gifBlob); await writable.close();
                            
                            if (file.newName !== file.oldName) {
                                await directoryHandle.removeEntry(file.oldName);
                            }
                        } else {
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(gifBlob); a.download = file.newName; a.click();
                        }
                        
                        remainingTasks--;
                        progressFill.style.width = `${((totalTasks - remainingTasks) / totalTasks) * 100}%`;
                        continue;
                    }

                    // 其他靜態或改名邏輯...
                    if (file.action === 'delete') {
                        if (directoryHandle) await directoryHandle.removeEntry(file.oldName);
                    } else {
                        let dataToWrite = null; let needsWrite = false;
                        
                        if (file.removeAnim) {
                            const fileData = await originalFileHandle.getFile();
                            dataToWrite = await getStaticBlob(fileData); needsWrite = true;
                        }

                        if (!dataToWrite && (file.action === 'rename' || needsWrite)) {
                            dataToWrite = await originalFileHandle.getFile();
                        }

                        if (file.action === 'rename') {
                            const newName = file.newName;
                            if (directoryHandle) {
                                const newFileHandle = await directoryHandle.getFileHandle(newName, { create: true });
                                const writable = await newFileHandle.createWritable();
                                await writable.write(dataToWrite); await writable.close();
                                await directoryHandle.removeEntry(file.oldName);
                            } else {
                                if (typeof originalFileHandle.move === 'function') {
                                    try {
                                        await originalFileHandle.move(newName);
                                        if (needsWrite) {
                                            const writable = await originalFileHandle.createWritable();
                                            await writable.write(dataToWrite); await writable.close();
                                        }
                                    } catch (err) { alert(`⚠️ 檔案 ${file.oldName} 改名失敗！\n請改用「選擇資料夾」模式。`); }
                                } else { alert(`⚠️ 您的瀏覽器尚未支援單選檔案直接改名功能，請改用「選擇資料夾」模式。`); }
                            }
                        } else if (needsWrite) {
                            const writable = await originalFileHandle.createWritable();
                            await writable.write(dataToWrite); await writable.close();
                        }
                    }
                } catch (e) { console.error(`處理 ${file.oldName} 時發生錯誤:`, e); }

                remainingTasks--;
                progressFill.style.width = `${((totalTasks - remainingTasks) / totalTasks) * 100}%`;
                progressText.innerText = `剩餘項目: ${remainingTasks} / ${totalTasks}`;
            }
            
            setTimeout(async () => {
                overlay.style.display = 'none';
                
                if (transaction.length > 0) {
                    undoStack.push(transaction);
                    document.getElementById('undo-btn').style.display = 'inline-block';
                }
                
                isProcessing = false; // 解除攔截
                alert("處理完成！");
                if (directoryHandle) await loadFiles();
            }, 300);
        }
    </script>
</body>
